html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Inter','Noto Sans SC',sans-serif;color:var(--text)}
canvas#network{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}

.btn-back{display:flex;align-items:center;gap:8px;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);backdrop-filter:blur(12px);color:var(--text-muted);font-size:13px;text-decoration:none;transition:all .3s}

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('network');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let currentStep = 0;
let animProgress = 0;
let transitioning = false;
let particles = [];
let bgParticles = [];
let time = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Background particles
for (let i = 0; i < 80; i++) {
  bgParticles.push({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5, a: Math.random() * 0.3 + 0.05
  });
}

// ==================== DRAWING ====================
function getNodePos(node) {
  return { x: node.x * W * 0.55 + W * 0.05, y: node.y * H * 0.7 + H * 0.1 };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function drawBackground() {
  // Gradient background
  const grad = ctx.createRadialGradient(W*0.3, H*0.4, 0, W*0.3, H*0.4, W*0.8);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(1, '#060D18');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.015)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Background particles
  bgParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,212,170,${p.a})`;
    ctx.fill();
  });
}

function drawEdge(from, to, label, progress) {
  const fp = getNodePos(from);
  const tp = getNodePos(to);
  const mx = (fp.x + tp.x) / 2;
  const my = (fp.y + tp.y) / 2 - 30;
  const p = Math.min(1, progress);

  // Bezier curve
  ctx.beginPath();
  ctx.moveTo(fp.x, fp.y);
  ctx.quadraticCurveTo(mx, my, tp.x, tp.y);
  ctx.strokeStyle = `rgba(255,255,255,${0.08 * p})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Glow line
  ctx.beginPath();
  ctx.moveTo(fp.x, fp.y);
  ctx.quadraticCurveTo(mx, my, tp.x, tp.y);
  const rgb = hexToRgb(from.color);
  ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${0.15 * p})`;
  ctx.lineWidth = 4;
  ctx.filter = 'blur(4px)';
  ctx.stroke();
  ctx.filter = 'none';

  // Flowing particles along edge
  if (p > 0.3) {
    const particleCount = 3;
    for (let i = 0; i < particleCount; i++) {
      const t = ((time * 0.0008 + i / particleCount) % 1);
      const px = (1-t)*(1-t)*fp.x + 2*(1-t)*t*mx + t*t*tp.x;
      const py = (1-t)*(1-t)*fp.y + 2*(1-t)*t*my + t*t*tp.y;
      const alpha = Math.sin(t * Math.PI) * 0.8 * p;
      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
      ctx.fill();
      // Glow
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, Math.PI * 2);
      const grd = ctx.createRadialGradient(px, py, 0, px, py, 6);
      grd.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha * 0.5})`);
      grd.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
      ctx.fillStyle = grd;
      ctx.fill();
    }
  }

  // Edge label
  if (p > 0.5 && label) {
    ctx.font = '10px "Noto Sans SC"';
    ctx.fillStyle = `rgba(148,163,184,${0.6 * p})`;
    ctx.textAlign = 'center';
    ctx.fillText(label, mx, my - 8);
  }
}

function drawNode(node, progress, isActive) {
  const pos = getNodePos(node);
  const p = Math.min(1, progress);
  const rgb = hexToRgb(node.color);
  const pulse = Math.sin(time * 0.003 + node.x * 10) * 0.3 + 0.7;
  const r = node.r * p;

  if (r < 1) return;

  // Outer glow
  const glowR = r * (1.8 + pulse * 0.4);
  const grd = ctx.createRadialGradient(pos.x, pos.y, r * 0.5, pos.x, pos.y, glowR);
  grd.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${0.15 * p * pulse})`);
  grd.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Pulse ring
  const ringR = r * (1.3 + pulse * 0.5);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, ringR, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${0.1 * p * pulse})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Main circle
  const mainGrd = ctx.createRadialGradient(pos.x - r*0.3, pos.y - r*0.3, 0, pos.x, pos.y, r);
  mainGrd.addColorStop(0, `rgba(${Math.min(255,rgb.r+40)},${Math.min(255,rgb.g+40)},${Math.min(255,rgb.b+40)},${0.9 * p})`);
  mainGrd.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},${0.7 * p})`);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.fillStyle = mainGrd;
  ctx.fill();

  // Border
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${0.6 * p})`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Icon (using text fallback)
  if (p > 0.5) {
    ctx.font = `${r * 0.55}px FontAwesome`;
    ctx.fillStyle = `rgba(255,255,255,${0.9 * p})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.icon, pos.x, pos.y);
  }

  // Label
  if (p > 0.6) {
    ctx.font = `500 ${Math.max(11, r * 0.32)}px "Noto Sans SC"`;
    ctx.fillStyle = `rgba(226,232,240,${0.9 * p})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(node.label, pos.x, pos.y + r + 10);

    // Description
    if (node.desc) {
      ctx.font = `300 ${Math.max(9, r * 0.26)}px "Noto Sans SC"`;
      ctx.fillStyle = `rgba(148,163,184,${0.6 * p})`;
      ctx.fillText(node.desc, pos.x, pos.y + r + 28);
    }
  }
}

function drawStep() {
  const step = STEPS[currentStep];
  const edgeProgress = Math.min(1, animProgress * 1.5);
  const nodeProgress = Math.max(0, (animProgress - 0.3) * 1.8);

  // Draw edges
  step.edges.forEach((edge, i) => {
    const fromNode = step.nodes.find(n => n.id === edge.from);
    const toNode = step.nodes.find(n => n.id === edge.to);
    if (fromNode && toNode) {
      const ep = Math.max(0, Math.min(1, (edgeProgress - i * 0.15) * 2));
      drawEdge(fromNode, toNode, edge.label, ep);
    }
  });

  // Draw nodes
  step.nodes.forEach((node, i) => {
    const np = Math.max(0, Math.min(1, (nodeProgress - i * 0.1) * 2.5));
    drawNode(node, np, i === 0);
  });
}

// ==================== ANIMATION LOOP ====================
let animStart = 0;
const ANIM_DURATION = 1200;

function animate(timestamp) {
  time = timestamp || 0;
  if (animStart === 0) animStart = time;
  const elapsed = time - animStart;
  animProgress = Math.min(1, elapsed / ANIM_DURATION);

  // Easing
  animProgress = animProgress < 0.5
    ? 4 * animProgress * animProgress * animProgress
    : 1 - Math.pow(-2 * animProgress + 2, 3) / 2;

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawStep();

  requestAnimationFrame(animate);
}

// ==================== STEP NAVIGATION ====================
function updateInfoPanel() {
  const step = STEPS[currentStep];
  const panel = document.getElementById('infoPanel');

  panel.classList.remove('visible');

  setTimeout(() => {
    document.getElementById('stepBadge').textContent = `STEP 0${step.id}`;
    document.getElementById('stepBadge').className = `step-badge ${step.color}`;
    document.getElementById('stepTitle').textContent = step.title;
    document.getElementById('stepSubtitle').textContent = step.subtitle;

    const nodesList = document.getElementById('stepNodes');
    nodesList.innerHTML = step.infoNodes.map(n => `<li>${n}</li>`).join('');

    const relList = document.getElementById('stepRelations');
    relList.innerHTML = step.infoRelations.map(r => `<li>${r}</li>`).join('');

    const tagsDiv = document.getElementById('stepTags');
    tagsDiv.innerHTML = step.tags.map(t => `<span class="ontology-tag">${t}</span>`).join('');

    panel.classList.add('visible');
  }, 300);
}

function updateNav() {
  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentStep);
    dot.classList.toggle('passed', i < currentStep);
  });
  document.getElementById('prevBtn').disabled = currentStep === 0;
  document.getElementById('nextBtn').disabled = currentStep === STEPS.length - 1;
}

function goToStep(index) {
  if (transitioning || index === currentStep || index < 0 || index >= STEPS.length) return;
  transitioning = true;
  const overlay = document.getElementById('transOverlay');
  overlay.classList.add('active');

  setTimeout(() => {
    currentStep = index;
    animStart = 0;
    animProgress = 0;
    updateInfoPanel();
    updateNav();
    overlay.classList.remove('active');
    setTimeout(() => { transitioning = false; }, 400);
  }, 400);
}

function nextStep() { goToStep(currentStep + 1); }
function prevStep() { goToStep(currentStep - 1); }

// Build nav dots
const dotsContainer = document.getElementById('navDots');
STEPS.forEach((step, i) => {
  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.title = step.title;
  dot.addEventListener('click', () => goToStep(i));
  dotsContainer.appendChild(dot);
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextStep();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevStep();
});

// ==================== INIT ====================
updateInfoPanel();
updateNav();
requestAnimationFrame(animate);
</script>
